name: CI
on:
  push:
    branches: [master]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  test:
    name: Test & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check src tests
      - name: Test (pytest + coverage)
        run: pytest --cov=helix_blockchain --cov-report=xml
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml

  test-postgres:
    name: Storage tests on Postgres
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: helix
          POSTGRES_PASSWORD: helix
          POSTGRES_DB: helix
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 10s
          --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Install (with Postgres driver)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,postgres]"
      - name: Storage + journal tests on Postgres
        env:
          HELIX_TEST_DB_URL: postgresql+psycopg://helix:helix@localhost:5432/helix
        run: pytest tests/test_postgres.py -v

  sonar:
    name: SonarQube
    runs-on: ubuntu-latest
    needs: test
    # Skip on forks / when the token is absent so PRs from contributors don't fail.
    if: ${{ github.event_name == 'push' }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
