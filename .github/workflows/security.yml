name: Security
on:
  push:
    branches: [master]
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    - cron: "0 6 * * 1"  # weekly

permissions:
  contents: read
  security-events: write  # for CodeQL SARIF upload

jobs:
  sca:
    name: SCA (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install pip-audit
      - run: pip-audit --strict --desc

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      # Report-only: the repo HISTORY contains early DEV-ONLY demo keys/token
      # (removed from the tree and rotated in #6). Rewriting history is out of
      # scope; .gitleaks.toml allowlists them and the scan still surfaces any
      # NEW secret in the logs. Flip to blocking once history is rewritten.
      - uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"
          GITLEAKS_CONFIG: .gitleaks.toml

  sast-bandit:
    name: SAST (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install bandit[toml]
      - run: bandit -c pyproject.toml -r src -ll

  codeql:
    name: SAST (CodeQL)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with: { languages: python }
      - uses: github/codeql-action/analyze@v3

  sbom:
    name: SBOM (CycloneDX)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: |
          pip install . cyclonedx-bom
          cyclonedx-py environment -o sbom.json
      - uses: actions/upload-artifact@v7
        with: { name: sbom, path: sbom.json }

  iac-scan:
    name: IaC / container scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
