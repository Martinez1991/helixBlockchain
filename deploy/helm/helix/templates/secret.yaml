{{- if .Values.secret.create }}
# DEV/TEST ONLY. In production provide the secret out-of-band (SealedSecrets,
# External Secrets Operator, Vault CSI) — never commit keys to values.yaml.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secret.name }}
  labels: {{- include "helix.labels" . | nindent 4 }}
type: Opaque
stringData:
  cluster_token: {{ .Values.secret.clusterToken | quote }}
  {{- range $ord, $hex := .Values.secret.privateKeys }}
  keys/{{ $ord }}: {{ $hex | quote }}
  {{- end }}
{{- end }}
