{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "helix.fullname" . }}
  labels: {{- include "helix.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels: {{- include "helix.selectorLabels" . | nindent 6 }}
  endpoints:
    - { port: http, path: /metrics, interval: 15s }
{{- end }}
