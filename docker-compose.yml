# Demo cluster: MongoDB + FIWARE Orion + a 3-validator Helix Blockchain network.
#
# ⚠️  The validator keys below are DEV-ONLY and public in this repo. Generate
#     fresh ones for any real deployment:  python -m helix_blockchain.tools.keygen
#
# With 3 validators, f = 0 and quorum = 3 (all must agree). For Byzantine fault
# tolerance (f = 1) run 4 validators.

x-node-pubkeys: &dummy
  # node-1 pub: 740d84745c42bd4fab91eb83c69f70c28653fe64bcd948332ca1abb6764d0bc8
  # node-2 pub: 8026ef9ae2f276cf645e77bb0e5b7cb380b62dafb9b6b4d2e406c4259be49412
  # node-3 pub: c94e4751b4ffbcef0e76a97cb443ecbd4db2d33d5444b76d6f02027d00c5d2dc

services:
  mongo:
    image: mongo:6
    command: ["--nojournal"]
    networks: [helix]

  orion:
    image: fiware/orion:3.10.1
    depends_on: [mongo]
    command: -dbhost mongo
    ports:
      - "1026:1026"
    networks: [helix]

  node-1:
    build: .
    depends_on: [orion]
    environment:
      HELIX_NODE__NODE_ID: node-1
      HELIX_NODE__PRIVATE_KEY_HEX: 6592960e6199e321bb0420bbf4fc77eb166990fd0c37b0abffc2430fa789d66f
      HELIX_ORION__HOST: mongo
      HELIX_ORION__PASSWORD: ""
      HELIX_CONSENSUS__BIND_PORT: "8000"
      HELIX_CONSENSUS__PEERS: >-
        node-2@node-2:8000|8026ef9ae2f276cf645e77bb0e5b7cb380b62dafb9b6b4d2e406c4259be49412,node-3@node-3:8000|c94e4751b4ffbcef0e76a97cb443ecbd4db2d33d5444b76d6f02027d00c5d2dc
      HELIX_STORAGE__URL: sqlite:////app/data/chain.db
      HELIX_DEBUG_API: "true"   # demo only: enables /admin/submit
    ports:
      - "8001:8000"
    networks: [helix]

  node-2:
    build: .
    depends_on: [orion]
    environment:
      HELIX_NODE__NODE_ID: node-2
      HELIX_NODE__PRIVATE_KEY_HEX: d0ff63934e60cb26f2ef07512d73124f7e115b73b338479a8bdccac375b6a213
      HELIX_ORION__HOST: mongo
      HELIX_ORION__PASSWORD: ""
      HELIX_CONSENSUS__BIND_PORT: "8000"
      HELIX_CONSENSUS__PEERS: >-
        node-1@node-1:8000|740d84745c42bd4fab91eb83c69f70c28653fe64bcd948332ca1abb6764d0bc8,node-3@node-3:8000|c94e4751b4ffbcef0e76a97cb443ecbd4db2d33d5444b76d6f02027d00c5d2dc
      HELIX_STORAGE__URL: sqlite:////app/data/chain.db
      HELIX_DEBUG_API: "true"   # demo only: enables /admin/submit
    ports:
      - "8002:8000"
    networks: [helix]

  node-3:
    build: .
    depends_on: [orion]
    environment:
      HELIX_NODE__NODE_ID: node-3
      HELIX_NODE__PRIVATE_KEY_HEX: 79cdffb1792582791dda7c9486449788afbcb67fa9917459e5c9aab85f80540a
      HELIX_ORION__HOST: mongo
      HELIX_ORION__PASSWORD: ""
      HELIX_CONSENSUS__BIND_PORT: "8000"
      HELIX_CONSENSUS__PEERS: >-
        node-1@node-1:8000|740d84745c42bd4fab91eb83c69f70c28653fe64bcd948332ca1abb6764d0bc8,node-2@node-2:8000|8026ef9ae2f276cf645e77bb0e5b7cb380b62dafb9b6b4d2e406c4259be49412
      HELIX_STORAGE__URL: sqlite:////app/data/chain.db
      HELIX_DEBUG_API: "true"   # demo only: enables /admin/submit
    ports:
      - "8003:8000"
    networks: [helix]

networks:
  helix:
