# Demo cluster: MongoDB + FIWARE Orion + a 3-validator Helix Blockchain network.
#
# Secrets are NOT versioned. Generate a local `.env` (gitignored) first:
#     python scripts/gen_dev_secrets.py
# then: docker compose up --build
#
# With 3 validators, f = 0 and quorum = 3 (all must agree). For Byzantine fault
# tolerance (f = 1) run 4 validators.

x-node: &node-defaults
  build: .
  depends_on: [orion]
  restart: unless-stopped
  environment: &node-env
    HELIX_ORION__HOST: mongo
    HELIX_ORION__PASSWORD: ""
    HELIX_CONSENSUS__BIND_PORT: "8000"
    HELIX_STORAGE__URL: sqlite:////app/data/chain.db
    HELIX_DEBUG_API: "true"             # demo only: enables /admin/submit
    HELIX_CLUSTER_TOKEN: ${CLUSTER_TOKEN}
    HELIX_COMMIT_KEY_HEX: ${COMMIT_KEY}   # keyed value commitments (same on all nodes)
  healthcheck:
    test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
    interval: 10s
    timeout: 3s
    retries: 5
  networks: [helix]

services:
  mongo:
    image: mongo:6
    command: ["--nojournal"]
    networks: [helix]

  orion:
    image: fiware/orion:3.10.1
    depends_on: [mongo]
    command: -dbhost mongo
    ports:
      - "1026:1026"
    networks: [helix]

  node-1:
    <<: *node-defaults
    environment:
      <<: *node-env
      HELIX_NODE__NODE_ID: node-1
      HELIX_NODE__PRIVATE_KEY_HEX: ${NODE1_KEY}
      HELIX_CONSENSUS__ADVERTISE: node-1:8000
      HELIX_CONSENSUS__PEERS: node-2@node-2:8000|${NODE2_PUB},node-3@node-3:8000|${NODE3_PUB}
    ports:
      - "8001:8000"

  node-2:
    <<: *node-defaults
    environment:
      <<: *node-env
      HELIX_NODE__NODE_ID: node-2
      HELIX_NODE__PRIVATE_KEY_HEX: ${NODE2_KEY}
      HELIX_CONSENSUS__ADVERTISE: node-2:8000
      HELIX_CONSENSUS__PEERS: node-1@node-1:8000|${NODE1_PUB},node-3@node-3:8000|${NODE3_PUB}
    ports:
      - "8002:8000"

  node-3:
    <<: *node-defaults
    environment:
      <<: *node-env
      HELIX_NODE__NODE_ID: node-3
      HELIX_NODE__PRIVATE_KEY_HEX: ${NODE3_KEY}
      HELIX_CONSENSUS__ADVERTISE: node-3:8000
      HELIX_CONSENSUS__PEERS: node-1@node-1:8000|${NODE1_PUB},node-2@node-2:8000|${NODE2_PUB}
    ports:
      - "8003:8000"

networks:
  helix:
